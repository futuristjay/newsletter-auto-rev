name: Daily Market Newsletter

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape and Analyze
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'SCRIPT' || true
          import json, os, sys, re, time
          from datetime import datetime, timezone, timedelta
          from urllib.request import urlopen, Request
          from urllib.error import HTTPError
          KST = timezone(timedelta(hours=9))
          NOW = datetime.now(KST)
          DATE_STR = NOW.strftime("%Y-%m-%d")
          DATE_KR = NOW.strftime("%Y년 %m월 %d일")
          HDR = dict()
          HDR["User-Agent"] = "Mozilla/5.0"
          def fetch(url):
              try:
                  r = urlopen(Request(url, headers=HDR), timeout=15)
                  return r.read().decode("utf-8", errors="replace")
              except:
                  return ""
          def xnum(text, pats):
              for p in pats:
                  m = re.search(p, text)
                  if m:
                      try: return float(m.group(1).replace(",",""))
                      except: pass
              return None
          print("=== SCRAPING ===")
          data = dict()
          for name, url, pats, unit in [
              ("Newcastle 6000", "https://www.oilpriceapi.com/live/coal-price", [r"Coal NOW: \$?([\d,.]+)"], "$/t"),
              ("HBA Indonesia", "https://coaltradeindo.com/hba-coal-index-price/", [r"HBA.*?GAR 6322.*?\$([\d,.]+)",r"HBA1.*?\$([\d,.]+)"], "$/t"),
              ("Coking Coal", "https://tradingeconomics.com/commodity/coking-coal", [r"Coking Coal.*?rose to ([\d,.]+)",r"Coking Coal.*?([\d,.]+) USD"], "$/t"),
          ]:
              v = xnum(fetch(url), pats)
              entry = dict()
              entry["value"] = v
              entry["unit"] = unit
              entry["source"] = url.split("/")[2]
              data[name] = entry
              print("  " + name + ": " + str(v))
          print("\n=== ANALYZING ===")
          api_key = os.environ.get("ANTHROPIC_API_KEY")
          if not api_key: print("NO KEY"); sys.exit(1)
          def ask(q):
              msg = [dict(role="user", content=q)]
              payload = dict(model="claude-sonnet-4-20250514", max_tokens=1024, messages=msg)
              body = json.dumps(payload).encode()
              for i in range(3):
                  try:
                      h = dict()
                      h["Content-Type"] = "application/json"
                      h["x-api-key"] = api_key
                      h["anthropic-version"] = "2023-06-01"
                      req = Request("https://api.anthropic.com/v1/messages", data=body, headers=h, method="POST")
                      with urlopen(req, timeout=90) as r:
                          res = json.loads(r.read().decode())
                      parts = res.get("content", [])
                      txt = ""
                      for b in parts:
                          if b.get("type") == "text":
                              txt = txt + b.get("text", "")
                      return txt.strip()
                  except HTTPError as e:
                      if e.code == 429:
                          w = 60 * (i + 1)
                          print("  429, waiting " + str(w) + "s...")
                          time.sleep(w)
                          continue
                      print("  HTTP " + str(e.code)); sys.exit(1)
              sys.exit(1)
          dp = json.dumps(data, ensure_ascii=False)
          print("Asking coal...")
          coal_text = ask("오늘은 " + DATE_KR + ". 석탄 데이터: " + dp + "\n\n한국어로 답해. 번호만:\n1.석탄 헤드라인\n2.인도네시아\n3.중국\n4.인도\n5.전망")
          print("  Got " + str(len(coal_text)) + " chars")
          time.sleep(5)
          print("Asking sectors...")
          sector_text = ask("오늘은 " + DATE_KR + ". 데이터: " + dp + "\n\n한국어로 답해. 번호만:\n1.구리\n2.우라늄\n3.삼성전자\n4.LS Electric\n5.현대차\n6.K-Beauty\n7.Tesla/테크\n8.매크로")
          print("  Got " + str(len(sector_text)) + " chars")
          def plines(t):
              r = dict()
              for line in t.split("\n"):
                  line = line.strip()
                  for i in range(1, 10):
                      for pfx in [str(i)+".", str(i)+")", str(i)+":"]:
                          if line.startswith(pfx):
                              r[i] = line[len(pfx):].strip()
              return r
          cl = plines(coal_text)
          sl = plines(sector_text)
          ticker = []
          for k in data:
              v = data[k]
              if v.get("value"):
                  item = dict()
                  item["label"] = k
                  item["value"] = str(v.get("unit","")) + str(v.get("value",""))
                  item["source"] = str(v.get("source",""))
                  item["date"] = DATE_STR
                  ticker.append(item)
          coal_sec = dict()
          coal_sec["briefHeadline"] = cl.get(1, "update")
          coal_sec["briefText"] = cl.get(1, "")
          coal_sec["countryIndonesia"] = cl.get(2, "")
          coal_sec["countryChina"] = cl.get(3, "")
          coal_sec["countryIndia"] = cl.get(4, "")
          coal_sec["outlook"] = [cl.get(5, "")]
          newsletter = dict()
          newsletter["date"] = DATE_STR
          newsletter["date_kr"] = DATE_KR
          newsletter["ticker"] = ticker
          newsletter["coal"] = coal_sec
          newsletter["copper"] = dict(headline=sl.get(1,""), summary=sl.get(1,""))
          newsletter["uranium"] = dict(headline=sl.get(2,""), summary=sl.get(2,""))
          newsletter["samsung"] = dict(headline=sl.get(3,""), summary=sl.get(3,""))
          newsletter["lsElectric"] = dict(headline=sl.get(4,""), summary=sl.get(4,""))
          newsletter["hyundai"] = dict(headline=sl.get(5,""), summary=sl.get(5,""))
          newsletter["kBeauty"] = dict(headline=sl.get(6,""), summary=sl.get(6,""))
          newsletter["teslaTech"] = dict(headline=sl.get(7,""), summary=sl.get(7,""))
          newsletter["macro"] = dict(headline=sl.get(8,""), summary=sl.get(8,""))
          newsletter["miniReport"] = dict(title="today", content=cl.get(1,""))
          os.makedirs("data", exist_ok=True)
          with open("data/newsletter.json", "w", encoding="utf-8") as f:
              json.dump(newsletter, f, ensure_ascii=False, indent=2)
          print("\n=== NEWSLETTER SAVED ===")
          print("Keys: " + str(list(newsletter.keys())))
          SCRIPT

      - name: Build HTML
        run: python3 src/build.py

      - name: Commit
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@newsletter.local"
          git add data/ dist/
          git diff --staged --quiet || git commit -m "Newsletter $(date +'%Y-%m-%d')"
          git push
