name: Daily Market Newsletter

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run Scraper
        run: python src/scraper.py
      
      - name: Run Analyzer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/analyzer.py
      
      - name: Run Builder
        run: python src/build.py
      
      - name: Commit results
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@newsletter.local"
          git add data/ dist/
          git diff --staged --quiet || git commit -m "Newsletter $(date +'%Y-%m-%d')"
          git push
