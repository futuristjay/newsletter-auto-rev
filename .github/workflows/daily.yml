name: Daily Market Newsletter

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 src/run.py

      - name: Commit
        run: |
          git config user.name "Newsletter Bot"
          git config user.email "bot@newsletter.local"
          git add data/ dist/
          git diff --staged --quiet || git commit -m "Newsletter $(date +'%Y-%m-%d')"
          git push
