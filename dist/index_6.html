// === API FETCH WITH MULTI-PROXY FALLBACK ===
const PROXIES=["https://corsproxy.io/?url=","https://api.allorigins.win/raw?url="];
let apiOk=false;

async function yf(sym){
const url="https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(sym)+"?range=5d&interval=1d";
for(const px of PROXIES){
try{
const r=await fetch(px+encodeURIComponent(url),{signal:AbortSignal.timeout(5000)});
if(!r.ok)continue;
const d=await r.json(),q=d.chart.result[0],cl=q.indicators.quote[0].close.filter(c=>c!=null);
if(cl.length<2)continue;
apiOk=true;
return{last:cl[cl.length-1],prev:cl[cl.length-2],ts:q.timestamp?q.timestamp[q.timestamp.length-1]:null,live:true};
}catch(e){continue;}
}
// Fallback to static
const fb=FB[sym];
if(fb)return{last:fb.v,prev:fb.p,ts:null,live:false,date:fb.d};
return null;
}

async function cg(){
try{
const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true",{signal:AbortSignal.timeout(5000)});
if(!r.ok)throw 0;
apiOk=true;
const d=await r.json();d._live=true;return d;
}catch(e){const f=JSON.parse(JSON.stringify(FB_CRYPTO));f._live=false;return f;}
}

function fm(n,k){if(k)return"₩"+Math.round(n).toLocaleString();return n>=100?"$"+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}):"$"+n.toFixed(2);}
function fc(a,b){const p=(a-b)/b*100;return{t:(p>=0?"+":"")+p.toFixed(2)+"%",c:p>=0?"up":"dn"};}
function td(d){if(!d)return"";const dt=new Date(d*1000);return(dt.getMonth()+1)+"/"+dt.getDate();}

// === RENDER ===
function spb(p){const c=p.c.startsWith("+")?'up':p.c.startsWith("-")?'dn':'fl';return`<div class="pb"><div class="pl">${p.lk?`<a href="${p.lk}" target="_blank">${p.l}</a>`:p.l}</div><div class="pv2">${p.v}<span class="un">${p.u||""}</span></div><div class="pr"><span class="${c}">${p.c}</span><span class="pp">전일 ${p.p}</span></div>${p.n?`<div class="pn">${p.n}</div>`:""}</div>`;}

document.getElementById("mb").innerHTML=MS.map(m=>`<div class="mi" id="m-${m.id}"><div class="ml">${m.l}</div><div class="mv fl">...</div><div class="mc fl">-</div></div>`).join("");
let h="";
Object.entries(SC).forEach(([k,s],i)=>{
const op=i===0;
h+=`<div class="cd${op?" op":""}" id="c-${k}"><div class="ch" onclick="tg('${k}')" ${op?`style="background:linear-gradient(135deg,${s.co}15,transparent)"`:""}>
<div class="cl"><span class="ci">${s.ic}</span><span class="cn">${s.nm}</span></div>
<div class="cr"><div class="ps" id="h-${k}"><div class="pv fl">...</div></div><span class="aw">▼</span></div>
</div><div class="cx"><div class="pg" id="pg-${k}">
${s.lk.map(x=>{const c=LV[x];return`<div class="pb" id="lv-${x}"><div class="pl"><a href="${c.lk}" target="_blank">${c.l}</a></div><div class="pv2 fl">로딩 중...</div></div>`;}).join("")}
${k==="crypto"?`<div class="pb" id="lv-btc"><div class="pl"><a href="https://www.coingecko.com/en/coins/bitcoin" target="_blank">Bitcoin (BTC)</a></div><div class="pv2 fl">로딩 중...</div></div><div class="pb" id="lv-eth"><div class="pl"><a href="https://www.coingecko.com/en/coins/ethereum" target="_blank">Ethereum (ETH)</a></div><div class="pv2 fl">로딩 중...</div></div>`:""}

</div>

</div></div></div>`;
});

function ulb(id,d,k){
const el=document.getElementById(id);if(!el||!d)return;
const ch=fc(d.last,d.prev),dt=d.live?td(d.ts)+" 종가":(d.date||"")+" 종가";
const badge=d.live?'<span class="badge live">LIVE</span>':'<span class="badge fb">FALLBACK</span>';
const lnk=el.querySelector(".pl").innerHTML;
el.innerHTML=`<div class="pl">${lnk} ${badge}</div><div class="pv2">${fm(d.last,k)}</div><div class="pr"><span class="${ch.c}">${ch.t}</span><span class="pp">전일 ${fm(d.prev,k)}</span></div><div class="pn">${d.live?'<span class="ld on"></span>':'<span class="ld off"></span>'}${dt}</div>`;
}

function tg(k){const c=document.getElementById("c-"+k);c.classList.toggle("op");const h=c.querySelector(".ch"),s=SC[k];h.style.background=c.classList.contains("op")?`linear-gradient(135deg,${s.co}15,transparent)`:"transparent";c.style.borderColor=c.classList.contains("op")?s.co+"55":"rgba(148,163,184,.12)";}
function xa(){Object.keys(SC).forEach(k=>{const c=document.getElementById("c-"+k);if(!c.classList.contains("op"))tg(k);})}
function ca(){Object.keys(SC).forEach(k=>{const c=document.getElementById("c-"+k);if(c.classList.contains("op"))tg(k);})}

// === LOAD ALL ===
async function load(){

// Macro
const macroResults=await Promise.all(MS.map(m=>yf(m.s)));
MS.forEach((m,i)=>{
const el=document.getElementById("m-"+m.id),d=macroResults[i];if(!el)return;

const ch=fc(d.last,d.prev),isK=m.id==="kr";
el.querySelector(".mv").textContent=isK?"₩"+Math.round(d.last).toLocaleString():d.last.toLocaleString(undefined,{maximumFractionDigits:2});
el.querySelector(".mv").classList.remove("fl");
el.querySelector(".mc").textContent=ch.t;el.querySelector(".mc").className="mc "+ch.c;
});
// Sector live prices
const liveResults={};
await Promise.all(Object.entries(LV).map(async([k,c])=>{
const isK=c.s.endsWith(".KS"),d=await yf(c.s);
liveResults[k]=d;
ulb("lv-"+k,d,isK);
Object.entries(SC).forEach(([sk,sv])=>{
if(sv.lk[0]===k&&d){
const ch=fc(d.last,d.prev),he=document.getElementById("h-"+sk);
if(he)he.innerHTML=`<div class="pv">${fm(d.last,isK)}</div><div class="pc ${ch.c}">${ch.t}</div>`;
}});
}));
// Crypto
const cr=await cg();
["bitcoin","ethereum"].forEach(id=>{
const el=document.getElementById("lv-"+(id==="bitcoin"?"btc":"eth"));
if(!el||!cr||!cr[id])return;
const p=cr[id],ch=p.usd_24h_change,isLive=cr._live;
const badge=isLive?'<span class="badge live">LIVE</span>':'<span class="badge fb">FALLBACK</span>';
const lnk=el.querySelector(".pl").innerHTML;
el.innerHTML=`<div class="pl">${lnk} ${badge}</div><div class="pv2">$${p.usd.toLocaleString(undefined,{maximumFractionDigits:2})}</div><div class="pr"><span class="${ch>=0?"up":"dn"}">${ch>=0?"+":""}${ch.toFixed(2)}%</span><span class="pp">24h 변동</span></div><div class="pn">${isLive?'<span class="ld on"></span>CoinGecko Live':'<span class="ld off"></span>Fallback 데이터'}</div>`;
});
const he=document.getElementById("h-crypto");
if(he&&cr&&cr.bitcoin){const ch=cr.bitcoin.usd_24h_change;he.innerHTML=`<div class="pv">$${cr.bitcoin.usd.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="pc ${ch>=0?"up":"dn"}">${ch>=0?"+":""}${ch.toFixed(2)}%</div>`;}
// Status
const now=new Date().toLocaleString("ko-KR");
if(apiOk){
document.getElementById("status").innerHTML=`<span class="ld on"></span>실시간 가격 자동 갱신 · Yahoo Finance / CoinGecko API`;
document.getElementById("ts").innerHTML=`<span class="ld on"></span>마지막 갱신: ${now} · 새로고침 시 자동 업데이트`;
}else{
document.getElementById("status").innerHTML=`<span class="ld off"></span>Fallback 모드 · API 접근 불가 시 마지막 확인 종가 표시`;
document.getElementById("ts").innerHTML=`<span class="ld off"></span>${now} · API 연결 실패 → Fallback 데이터 사용 중 · GitHub Pages에서 실시간 작동`;
}
}
