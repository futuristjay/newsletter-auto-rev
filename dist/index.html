// Render Macro Bar
function renderMacro(){
const el=document.getElementById('macroBar');
el.innerHTML=MACRO.map(m=>{
const cls=m.c.startsWith('+')?'up':m.c.startsWith('-')?'dn':'flat';
return `<div class="item"><div class="lbl">${m.l}</div><div class="val">${m.v}</div><div class="chg ${cls}">${m.c}</div></div>`;
}).join('');
}

// Render Cards
function renderCards(){
const container=document.getElementById('cards');
let html='';
for(const[key,s] of Object.entries(S)){
const isCoal=key==='coal';
html+=`<div class="card${isCoal?' open':''}" id="card-${key}" data-color="${s.color}">
<div class="card-head" onclick="toggle('${key}')" style="${isCoal?'background:linear-gradient(135deg,'+s.color+'15,transparent)':''}">
<div class="left"><span class="icon">${s.icon}</span><span class="name">${s.name}</span></div>
<div class="right">
${s.prices.slice(0,2).map(p=>{
const cls=p.c.startsWith('+')?'up':p.c.startsWith('-')?'dn':'flat';
return `<div class="price-sm"><div class="v">${p.v}</div><div class="c ${cls}">${p.c}</div></div>`;
}).join('')}
<span class="arrow">▼</span>
</div>
</div>
<div class="card-body">
<!-- Prices -->
<div class="prices">
${s.prices.map(p=>{
const cls=p.c.startsWith('+')?'up':p.c.startsWith('-')?'dn':'flat';
return `<div class="price-box">
<div class="plbl">${p.lk?`<a href="${p.lk}" target="_blank" rel="noopener" style="color:#94A3B8;text-decoration:underline">${p.l}</a>`:p.l}</div>
<div class="pval">${p.v}<span class="unit">${p.u}</span></div>
<div class="prow"><span class="chg ${cls}">${p.c}</span><span class="prev">전일 ${p.p}</span></div>
${p.n?`<div class="note">${p.n}</div>`:''}
</div>`;
}).join('')}
</div>
<!-- News -->
<div style="margin-bottom:14px">
<div class="sec-title" style="color:${s.color}"><span class="ico">📰</span> 주요 뉴스 & 이슈</div>
${s.news.map(n=>`<div class="news-item" style="border-left-color:${s.color}55">
<div class="hl">${n.h}</div><div class="dt">${n.t}</div><div class="src">${n.lk?`<a href="${n.lk}" target="_blank" rel="noopener" style="color:#94A3B8;text-decoration:underline">${n.s}</a>`:`${n.s}`} · ${n.d}</div>
</div>`).join('')}
</div>
<!-- Insight -->
<div class="insight-box" style="background:linear-gradient(135deg,${s.color}10,${s.color}05);border-color:${s.color}30">
<div class="ititle" style="color:${s.color}">💡 투자 인사이트</div>
<div class="ibody">${s.insight}</div>
</div>
<!-- Indicators -->
<div>
<div class="sec-title" style="color:${s.color}"><span class="ico">📊</span> 선행 지표</div>
${s.inds.map(i=>`<div class="ind-item">
<div class="ind-row"><span class="ind-name">${i.n}</span><span class="ind-stat">${i.st}</span></div>
<div class="ind-rel">→ ${i.r}</div>
</div>`).join('')}
</div>
</div>
</div>`;
}
container.innerHTML=html;
}

function toggle(key){
const card=document.getElementById('card-'+key);
card.classList.toggle('open');
const head=card.querySelector('.card-head');
if(card.classList.contains('open')){
head.style.background='linear-gradient(135deg,'+S[key].color+'15,transparent)';
card.style.borderColor=S[key].color+'55';
}else{
head.style.background='transparent';
card.style.borderColor='rgba(148,163,184,.12)';
}
}
function expandAll(){Object.keys(S).forEach(k=>{const c=document.getElementById('card-'+k);if(!c.classList.contains('open'))toggle(k);})}
function collapseAll(){Object.keys(S).forEach(k=>{const c=document.getElementById('card-'+k);if(c.classList.contains('open'))toggle(k);})}

renderMacro();
renderCards();
</script>
